<!DOCTYPE html>
<html>

<head>
    <title>Weather-Cast</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>


<!-- Background Image using src -->
<img src="weather.jpg" class="background">


<div class="container">


    <h1>🌤 Weather-Cast</h1>


    <div class="search">

        <input 
        id="city" 
        type="text" 
        placeholder="Enter city name">


        <button onclick="getWeather()">
            Search
        </button>

    </div>



    <div class="weather">

        <h2 id="cityName">---</h2>


        <img id="icon">


        <h1 id="temperature">
            -- °C
        </h1>


        <p id="condition">
            Weather
        </p>


        <p id="humidity">
            Humidity: --
        </p>


    </div>


</div>


<script src="script.js"></script>


</body>

</html>
